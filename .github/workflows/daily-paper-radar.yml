name: Daily Paper Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "10 22 * * *"

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run daily paper radar
        run: paper-learning daily --date today
      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily data/public data/exports
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update daily paper radar"
            git push
          fi
      - name: Upload generated report
        uses: actions/upload-artifact@v4
        with:
          name: daily-paper-radar
          path: |
            daily/**/*.md
            daily/**/*.json
            data/public/*.json
            data/exports/*.csv
            data/exports/*.jsonl
