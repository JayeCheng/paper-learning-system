name: Daily Paper Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "10 22 * * *"

permissions:
  contents: write

concurrency:
  group: daily-paper-radar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run daily paper radar
        run: paper-learning daily --date today
      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily data/public data/exports data/state
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            REPORT_DATE="$(python -c "import json; print(json.load(open('data/public/latest.json', encoding='utf-8'))['latest']['date'])")"
            git commit -m "chore: update daily paper radar ${REPORT_DATE}"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
      - name: Upload generated report
        uses: actions/upload-artifact@v4
        with:
          name: daily-paper-radar
          path: |
            daily/**/*.md
            daily/**/*.json
            data/public/*.json
            data/exports/*.csv
            data/exports/*.jsonl
            data/state/*.json
            data/state/*.jsonl
