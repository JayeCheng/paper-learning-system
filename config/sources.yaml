sources:
  arxiv:
    enabled: true
    type: preprint
    fetcher: paper_learning.fetchers.arxiv_fetcher
    max_results_per_window: 20
    source_groups:
      gpu_graphics:
        categories: [cs.GR, cs.CV]
        max_results_per_window: 20
        target_min_daily: 2
      architecture:
        categories: [cs.AR, cs.DC, cs.PF]
        max_results_per_window: 20
        target_min_daily: 1
      llm_agent:
        categories: [cs.AI, cs.LG, cs.CL, cs.SE]
        max_results_per_window: 25
        target_min_daily: 2
      cognition_social:
        categories: [q-bio.NC, cs.HC, physics.soc-ph, cs.SI]
        max_results_per_window: 20
        target_min_daily: 1
    windows:
      recent_24h:
        days: 1
      recent_7d:
        days: 7
    rate_limit_per_minute: 30
    notes: Public metadata source for CS, physics, and quantitative fields.

  openreview:
    enabled: true
    type: conference_review
    fetcher: paper_learning.fetchers.openreview_fetcher
    venues: [ICLR, NeurIPS, ICML, COLM, ACL, EMNLP]
    venue_ids: []
    years: [2026, 2025]
    max_results_per_venue: 10
    rate_limit_per_minute: 20
    notes: Useful for ML, systems, and agent evaluation venues.

  biorxiv:
    enabled: true
    type: preprint
    fetcher: paper_learning.fetchers.biorxiv_fetcher
    servers: [biorxiv, medrxiv]
    categories: [neuroscience, animal behavior and cognition]
    window_days: 7
    max_results: 20
    rate_limit_per_minute: 20
    notes: Useful for cognitive science and behavioral science.

  semantic_scholar:
    enabled: true
    type: metadata_enrichment
    fetcher: paper_learning.fetchers.semantic_scholar_fetcher
    max_enrichments_per_run: 12
    max_without_api_key: 3
    timeout_seconds: 20
    rate_limit_per_minute: 10
    notes: Optional enrichment source. API key must never be committed.

  github:
    enabled: true
    type: code_signal
    fetcher: paper_learning.fetchers.github_fetcher
    rate_limit_per_minute: 10
    notes: Tracks project and benchmark signals related to papers.
